<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adriana & Alejandro - Invitación</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Playfair+Display:ital,wght@0,400;1,700&display=swap" rel="stylesheet">

<style>
:root {
    --petroleo: #3D5A5D;
    --blanco-papel: #F2F2F0;
    --dorado: linear-gradient(135deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
}

body, html {
    margin: 0;
    padding: 0;
    background-color: var(--petroleo);
    font-family: 'Cormorant Garamond', serif;
    color: white;
    overflow-x: hidden;
    text-align: center;
}

/* SOBRE */
#pantalla-sello {
    position: fixed;
    inset: 0;
    z-index: 3000;
    background-color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: opacity 0.8s ease;
}
#pantalla-sello img { width: 100%; height: 100%; object-fit: cover; }

.texto-abrir {
    position: absolute;
    bottom: 8%;
    background: rgba(255,255,255,0.9);
    padding: 12px 25px;
    border-radius: 30px;
    color: var(--petroleo);
    font-family: 'Cinzel';
    animation: pulse 2s infinite;
}

/* VIDEO */
#contenedor-video {
    position: fixed;
    inset: 0;
    z-index: 2000;
    background: black;
    display: none;
    justify-content: center;
    align-items: center;
}

#video-invitacion {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* INVITACIÓN */
#invitacion {
    display: none;
    max-width: 500px;
    margin: 0 auto;
    background-color: var(--petroleo);
    padding-bottom: 60px;
}

.seccion-blanca {
    background: var(--blanco-papel);
    color: #333;
    padding: 60px 20px;
    border-radius: 0 0 50% 10% / 0 0 100px 100px;
}

.gold-text {
    font-family: 'Cinzel';
    background: var(--dorado);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    font-weight: bold;
}

.foto-pareja {
    width: 85%;
    border: 10px solid white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    margin-top: -50px;
}

.card {
    background: white;
    margin: 30px 20px;
    padding: 30px;
    border-radius: 40px 40px 10px 10px;
    color: #444;
}

.btn {
    background: var(--petroleo);
    color: white;
    padding: 12px 25px;
    border-radius: 25px;
    text-decoration: none;
    display: inline-block;
    margin: 15px 0;
    font-family: 'Cinzel';
    font-size: 0.8rem;
}

.dot {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    display: inline-block;
    margin: 5px;
}

@keyframes pulse {
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.05);}
}

.reveal { animation: fadeInUp 1.5s ease-out; }

@keyframes fadeInUp {
    from { opacity:0; transform:translateY(30px);}
    to { opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<!-- SOBRE -->
<div id="pantalla-sello" onclick="iniciarExperiencia()">
    <div class="texto-abrir">TOCAR PARA ABRIR</div>
</div>

<!-- VIDEO -->
<div id="contenedor-video">
    <video id="video-invitacion" playsinline>
        <source src="video_.mp4" type="video/mp4">
    </video>
</div>

<!-- INVITACIÓN -->
<div id="invitacion">

    <section class="seccion-blanca">
        <h2 class="gold-text">Save the Date</h2>
        <h1 style="font-family:'Playfair Display'">Adriana & Alejandro</h1>
        <p>10 JULIO 2026</p>
    </section>

    <img src="FOTO NOSOTROS.png" class="foto-pareja">

    <div class="card">
        <h3 class="gold-text">Boda Civil</h3>
        <p>JMD Villa de Vallecas</p>
        <a href="https://maps.app.goo.gl/V3H9mC7qQZc5Z6Yh8" target="_blank" class="btn">Google Maps</a>

        <hr>

        <h3 class="gold-text">Recepción</h3>
        <p>Restaurante San Francisco</p>
        <a href="https://maps.app.goo.gl/r6p6zMh9G5s4K5XW7" target="_blank" class="btn">Google Maps</a>
    </div>

    <section style="padding:20px;">
        <h3 class="gold-text">Dress Code</h3>
        <p>FORMAL DE VERANO</p>
        <div class="dot" style="background:#ADD8E6;"></div>
        <div class="dot" style="background:#C1E1C1;"></div>
        <div class="dot" style="background:#E6E6FA;"></div>
        <div class="dot" style="background:#FFB7C5;"></div>
        <div class="dot" style="background:#F0E68C;"></div>
    </section>

    <div class="seccion-blanca" style="border-radius:100px 100px 0 0;">
        <h2 class="gold-text">¿Nos acompañas?</h2>
        <a href=" https://forms.gle/NodqzsHD8gMqcWkM7 " class="btn">CONFIRMAR ASISTENCIA</a>
    </div>

</div>

<script>
const sobre = document.getElementById('pantalla-sello');
const contenedorVideo = document.getElementById('contenedor-video');
const video = document.getElementById('video-invitacion');
const invitacion = document.getElementById('invitacion');

function iniciarExperiencia(){
    sobre.style.opacity='0';

    setTimeout(()=>{
        sobre.style.display='none';
        contenedorVideo.style.display='flex';
        video.play();
    },600);
}

video.onended=function(){
    contenedorVideo.style.opacity='0';

    setTimeout(()=>{
        contenedorVideo.style.display='none';
        invitacion.style.display='block';
        invitacion.classList.add('reveal');
    },1000);
}
</script>

</body>
</html>
